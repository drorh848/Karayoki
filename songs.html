<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>קריוקי · רשימת שירים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Secular+One&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0710; --bg2:#150a1d; --panel:#1c1026; --panel2:#241433;
  --amber:#ffb43d; --amber-soft:#ffd58a; --hot:#ff5d8f; --glow:#ff9e2c;
  --text:#fdf6ee; --muted:#b29bc4; --line:rgba(255,180,61,.16);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Heebo',sans-serif;background:
    radial-gradient(1200px 600px at 50% -10%, rgba(255,158,44,.18), transparent 60%),
    radial-gradient(900px 500px at 90% 110%, rgba(255,93,143,.14), transparent 60%),
    linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-text-size-adjust:100%;
}
.wrap{max-width:760px;margin:0 auto;padding:0 18px 80px}
.hero{text-align:center;padding:32px 0 18px}
.eyebrow{font-size:13px;letter-spacing:.34em;color:var(--amber);font-weight:700;margin-bottom:10px}
.hero h1{
  font-family:'Secular One',sans-serif;font-weight:400;margin:0;
  font-size:clamp(34px,10vw,64px);line-height:.95;color:var(--amber-soft);
  background:linear-gradient(180deg,#fff 0%,var(--amber-soft) 55%,var(--amber) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 4px 30px rgba(255,158,44,.45));
}
@supports not ((-webkit-background-clip:text) or (background-clip:text)){
  .hero h1{-webkit-text-fill-color:var(--amber-soft);background:none}
}
.hero p{margin:12px auto 0;color:var(--muted);font-size:15px;max-width:440px;line-height:1.6}
.mic{font-size:28px;display:inline-block;animation:bob 3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-7px) rotate(4deg)}}

.searchbar{position:sticky;top:0;z-index:30;padding:12px 0 14px;
  background:linear-gradient(180deg,var(--bg) 65%,rgba(11,7,16,0));
  -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.searchbox{display:flex;align-items:center;gap:10px;background:var(--panel);
  border:1.5px solid var(--line);border-radius:16px;padding:13px 16px;
  box-shadow:0 8px 30px rgba(0,0,0,.4)}
.searchbox:focus-within{border-color:var(--amber);box-shadow:0 0 0 3px rgba(255,180,61,.15)}
.searchbox input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Heebo';font-size:17px}
.searchbox input::placeholder{color:var(--muted);opacity:.7}
.clearbtn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px;display:none}
.count{text-align:center;color:var(--muted);font-size:13px;margin-top:8px}

.artist{margin-top:26px}
.artist-name{display:flex;align-items:center;gap:12px;margin:0 2px 12px;
  font-family:'Secular One';font-size:23px;color:var(--amber-soft)}
.artist-name::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
.artist-name .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 12px var(--glow);flex:0 0 auto}

.song{display:flex;align-items:center;gap:14px;width:100%;text-align:right;
  background:var(--panel);border:1.5px solid transparent;border-radius:14px;
  padding:14px 16px;margin-bottom:9px;color:var(--text);font-size:17px;font-weight:500}
.song .num{font-family:'Secular One';font-size:14px;color:var(--amber);min-width:46px;
  text-align:center;background:rgba(255,180,61,.1);border-radius:8px;padding:6px}
.song .ttl{flex:1}

.empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:16px;line-height:1.7}
.empty .big{font-size:38px;display:block;margin-bottom:12px}
.loading{text-align:center;color:var(--muted);padding:50px 20px}
.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--amber);
  border-radius:50%;animation:rot 0.8s linear infinite;margin:0 auto 16px}
@keyframes rot{to{transform:rotate(360deg)}}
#sentinel{height:40px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

<div class="wrap">

  <div class="searchbar">
    <div class="searchbox">

  </div>
  <div id="list"><div class="loading"><div class="spin"></div>טוען את רשימת השירים...</div></div>
  <div id="sentinel"></div>
</div>
