:root{--bg:#0c0810;--card:#171020;--card2:#1f1630;--bd:#2d2140;--txt:#f3eefb;--muted:#9b8bb5;--gold:#ffb443;--gold2:#ff8a3d}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:16px}
.wrap{max-width:760px;margin:0 auto}
.top{text-align:center;margin-bottom:18px}
h1{font-size:28px;background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--muted);font-size:15px;margin-top:6px}
.search{width:100%;background:var(--card);border:1px solid var(--bd);color:var(--txt);padding:15px;border-radius:14px;font-size:16px;font-family:inherit;text-align:right;margin-bottom:14px}
.search:focus{outline:none;border-color:var(--gold)}
#count{color:var(--muted);font-size:14px;margin-bottom:14px;text-align:center}
.artist-group{margin-bottom:20px}
.artist-name{font-size:19px;font-weight:700;color:var(--gold);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.song{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:13px 16px;margin-bottom:6px}
.song-num{color:var(--gold);font-size:14px;font-weight:700;min-width:42px}
.song-title{flex:1;font-size:16px}
.loading{text-align:center;color:var(--muted);padding:50px 0;font-size:16px}
.spin{width:44px;height:44px;border:4px solid var(--bd);border-top-color:var(--gold);border-radius:50%;margin:0 auto 16px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>

var SONGS=[];
function esc(t){return (t||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
var searchEl=document.getElementById('search');
function render(){
  var q=(searchEl.value||'').trim().toLowerCase();
  var list=SONGS;
  if(q){
    var qn=q.replace('#','').trim();
    if(/^\d+$/.test(qn)){ list=SONGS.filter(function(s){return String(s.num)===qn;}); }
    else { list=SONGS.filter(function(s){return (s.title||'').toLowerCase().indexOf(q)>=0||(s.artist||'').toLowerCase().indexOf(q)>=0;}); }
  }
  document.getElementById('count').textContent=list.length+' שירים'+(q?' (מתוך '+SONGS.length+')':'');
  if(!list.length){document.getElementById('list').innerHTML='<div class="loading">לא נמצאו שירים</div>';return;}
  var groups={},order=[];
  list.forEach(function(s){var a=s.artist||'ללא אומן';if(!groups[a]){groups[a]=[];order.push(a);}groups[a].push(s);});
  var html='';
  order.forEach(function(a){
    html+='<div class="artist-group"><div class="artist-name">'+esc(a)+' ('+groups[a].length+')</div>';
    groups[a].forEach(function(s){
      var idx=(typeof s.num==='number')?s.num:(SONGS.indexOf(s)+1);
      html+='<div class="song"><span class="song-num">#'+idx+'</span><span class="song-title">'+esc(s.title)+'</span></div>';
    });
    html+='</div>';
  });
  document.getElementById('list').innerHTML=html;
}
searchEl.addEventListener('input',render);
db.ref('songs_json').on('value',function(snap){
  var val=snap.val();
  if(val){ try{ SONGS=JSON.parse(val); }catch(e){ SONGS=[]; } }
  if(!SONGS||!SONGS.length)SONGS=SEED.map(function(s,i){return {id:'s'+i,artist:s.artist||'',title:s.title,num:i+1};});
  var mx=0;SONGS.forEach(function(s){if(typeof s.num==='number'&&s.num>mx)mx=s.num;});SONGS.forEach(function(s){if(typeof s.num!=='number'){mx++;s.num=mx;}});
  render();
},function(err){
  document.getElementById('list').innerHTML='<div class="loading" style="color:#ff5d8f">שגיאת חיבור<br>מציג רשימה מקומית</div>';
  SONGS=SEED.map(function(s,i){return {id:'s'+i,artist:s.artist||'',title:s.title};});
  render();
});
